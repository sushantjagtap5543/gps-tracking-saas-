services:

  # -----------------------------
  # PostgreSQL
  # -----------------------------
  postgres:
    image: postgres:15-alpine
    container_name: gps-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gps-network
    restart: unless-stopped

  # -----------------------------
  # Redis
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: gps-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gps-network
    restart: unless-stopped

  # -----------------------------
  # Backend
  # -----------------------------
  backend:
    build:
      context: ./backend
    container_name: gps-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - gps-network
    restart: unless-stopped

  # -----------------------------
  # Frontend
  # -----------------------------
  frontend:
    build:
      context: ./frontend
    container_name: gps-frontend
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - gps-network
    restart: unless-stopped

  # -----------------------------
  # NGINX Reverse Proxy
  # -----------------------------
  nginx:
    image: nginx:alpine
    container_name: gps-nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - gps-network
    restart: unless-stopped

# -----------------------------
# VOLUMES
# -----------------------------
volumes:
  postgres_data:
  redis_data:

# -----------------------------
# NETWORK
# -----------------------------
networks:
  gps-network:
    driver: bridge
