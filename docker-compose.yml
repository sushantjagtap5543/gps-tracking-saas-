version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: gps-postgres
    environment:
      POSTGRES_DB: gps_tracking
      POSTGRES_USER: gps_admin
      POSTGRES_PASSWORD: secure_password_change_this
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gps_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gps-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gps-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gps-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gps-backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gps_admin
      DB_PASSWORD: secure_password_change_this
      DB_NAME: gps_tracking
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your_super_secret_jwt_key_change_this
      PORT: 5000
      STRIPE_SECRET_KEY: sk_test_your_stripe_key_here
      TWILIO_ACCOUNT_SID: your_twilio_sid
      TWILIO_AUTH_TOKEN: your_twilio_token
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - gps-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gps-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - gps-network
    restart: unless-stopped

  # Admin Portal
  admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile.admin
    container_name: gps-admin
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    ports:
      - "3001:3001"
    networks:
      - gps-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: gps-nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
      - admin
    networks:
      - gps-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gps-network:
    driver: bridge

# ==========================================
# USAGE:
# ==========================================
# docker-compose up -d          # Start all services
# docker-compose logs -f        # View logs
# docker-compose down           # Stop all services
# docker-compose down -v        # Stop and remove volumes
